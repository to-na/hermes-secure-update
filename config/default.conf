# hermes-secure-update configuration
# Source this file — values override defaults in bin/hermes-secure-update.

# Path to the hermes-agent git checkout
HERMES_REPO="${HERMES_HOME:-$HOME/.hermes}/hermes-agent"

# Regex pattern the origin remote URL must match (blocks update if mismatch)
EXPECTED_REMOTE_PATTERN="github\.com[:/]NousResearch/hermes-agent(\.git)?$"

# Risk thresholds for --auto mode
#   low=0, medium=1, high=2
# Auto-approve: apply without prompt if risk ≤ this level
AUTO_APPROVE_BELOW="low"
# Block: refuse to apply if risk > this level (even with --auto)
BLOCK_ABOVE="high"

# Show full file list in review phase
SHOW_DIFF="true"

# Prefer release tags over main HEAD (not yet implemented upstream)
PREFER_TAGS="false"

# Path to known maintainer emails (one per line, # comments allowed)
KNOWN_MAINTAINERS_FILE="$SCRIPT_DIR/../config/maintainers.txt"
