# hermes-secure-update configuration
# Source this file — values override defaults in bin/hermes-secure-update.

# Path to the hermes-agent git checkout
HERMES_REPO="${HERMES_HOME:-$HOME/.hermes}/hermes-agent"

# Regex pattern the origin remote URL must match (blocks update if mismatch)
EXPECTED_REMOTE_PATTERN="github\.com[:/]NousResearch/hermes-agent(\.git)?$"

# Risk thresholds for --auto mode
#   low=0, medium=1, high=2
# Auto-approve: apply without prompt if risk ≤ this level
AUTO_APPROVE_BELOW="low"
# Block: refuse to apply if risk > this level (even with --auto)
BLOCK_ABOVE="high"

# Show full file list in review phase
SHOW_DIFF="true"

# Prefer release tags over main HEAD (not yet implemented upstream)
PREFER_TAGS="false"

# Known maintainer emails (one per line, # comments allowed)
KNOWN_MAINTAINERS_FILE="$SCRIPT_DIR/../config/maintainers.txt"

# ── AI Security Review ────────────────────────────────────────────────────────
# Enable AI-powered security review of the diff (uses `hermes chat -q`)
AI_REVIEW_ENABLED="true"
# Model for the AI review (empty = hermes default model)
AI_REVIEW_MODEL=""
# Max diff chars sent to the AI (larger diffs are truncated with a note)
AI_REVIEW_MAX_DIFF_CHARS="12000"
# When AI flags the diff as suspicious, block --auto and require explicit human yes
AI_BLOCK_ON_SUSPICIOUS="true"

# ── Notifications ─────────────────────────────────────────────────────────────
# Enable macOS notifications + log file (activated by --notify flag)
NOTIFY_ENABLED="true"
# Log file path (default: ~/.hermes/secure-update/notify.log)
NOTIFY_LOG="${HERMES_HOME:-$HOME/.hermes}/secure-update/notify.log"
